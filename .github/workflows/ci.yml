name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync --dev --locked
        working-directory: apps/backend
      - run: uv run ruff check src tests
        working-directory: apps/backend
      - run: uv run mypy src
        working-directory: apps/backend
      - run: uv run pytest
        working-directory: apps/backend

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install --global pnpm@11.15.1
      - run: pnpm install --no-frozen-lockfile
        working-directory: apps/web
      - run: pnpm typecheck
        working-directory: apps/web
      - run: pnpm test --run
        working-directory: apps/web
      - run: pnpm build
        working-directory: apps/web

  compose-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync --dev --locked
        working-directory: apps/backend
      - run: uv run pytest tests/contract/deployment -v
        working-directory: apps/backend
      - run: docker compose -f deploy/compose/compose.yml config --quiet
